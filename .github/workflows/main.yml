name: Build Mobile APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Set up NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Initialize Android App
      run: |
        mkdir -p www
        cp index.html www/ 2>/dev/null || true
        npm init -y
        npm install @capacitor/core @capacitor/cli
        # এখানে অ্যাপের নাম "Biplob BAR Planner" করে দেওয়া হলো
        yes | npx cap init "Biplob BAR Planner" "com.biplob.barplanner" --web-dir=www
        npm install @capacitor/android
        npx cap add android

    - name: Set Custom App Icon
      run: |
        # আইকন জেনারেট করার টুল ইনস্টল করা হচ্ছে
        npm install @capacitor/assets --save-dev
        
        # যদি আপনার দেওয়া icon.png ফাইলটি থাকে, তবে সেটি দিয়ে অ্যান্ড্রয়েডের সব সাইজের আইকন অটো তৈরি হবে
        if [ -f icon.png ]; then
          npx capacitor-assets generate --android
        else
          echo "icon.png found না হওয়ায় ডিফল্ট আইকন ব্যবহার করা হলো।"
        fi

    - name: Sync App
      run: npx cap sync

    - name: Fix Kotlin Duplicate Dependencies
      run: |
        sed -i '/dependencies {/a \    modules {\n        module("org.jetbrains.kotlin:kotlin-stdlib-jdk7") { replacedBy("org.jetbrains.kotlin:kotlin-stdlib") }\n        module("org.jetbrains.kotlin:kotlin-stdlib-jdk8") { replacedBy("org.jetbrains.kotlin:kotlin-stdlib") }\n    }' android/app/build.gradle

    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Biplob-BAR-Planner-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        
