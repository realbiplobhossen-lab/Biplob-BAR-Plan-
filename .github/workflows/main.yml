name: Build Mobile APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Set up NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Initialize Android App
      run: |
        mkdir -p www
        cp index.html www/ 2>/dev/null || true
        npm init -y
        npm install @capacitor/core @capacitor/cli
        yes | npx cap init "Bar Council Prep" "com.barcouncil.app" --web-dir=www
        npm install @capacitor/android
        npx cap add android

    - name: Sync App
      run: npx cap sync

    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Bar-Council-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        
